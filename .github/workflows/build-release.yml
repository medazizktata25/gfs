name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false   
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: gfs
            artifact_name: gfs-linux-x64
            archive_name: gfs-linux-x64.tar.gz

          # macOS x86_64
          - os: macos-latest-large
            target: x86_64-apple-darwin
            binary_name: gfs
            artifact_name: gfs-darwin-x64
            archive_name: gfs-darwin-x64.zip

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest-large
            target: aarch64-apple-darwin
            binary_name: gfs
            artifact_name: gfs-darwin-arm64
            archive_name: gfs-darwin-arm64.zip

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: gfs.exe
            artifact_name: gfs-windows-x86_64
            archive_name: gfs-windows-x86_64.tar.gz

    runs-on: ${{ matrix.os }}
    env:
      # Embedded at compile time by option_env!() in gfs-telemetry.
      GFS_POSTHOG_API_KEY: ${{ secrets.GFS_POSTHOG_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p gfs-cli

      - name: Create archive (tar.gz for Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cd staging
          tar czf ../${{ matrix.archive_name }} *
          cd ..
          rm -rf staging

      - name: Create archive (zip for macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cd staging
          zip -q ../${{ matrix.archive_name }} *
          cd ..
          rm -rf staging

      - name: Create archive (tar.gz for Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cd staging
          tar czf ../${{ matrix.archive_name }} *
          cd ..
          rm -rf staging

      - name: Calculate checksums (Linux)
        if: runner.os == 'Linux'
        run: sha256sum ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Calculate checksums (macOS)
        if: runner.os == 'macOS'
        run: shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Calculate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path ${{ matrix.archive_name }} -Algorithm SHA256).Hash
          "$hash  ${{ matrix.archive_name }}" | Out-File -Encoding ascii ${{ matrix.archive_name }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  build-ai-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create AI tools archive
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          tar czf gfs-ai-tools-${VERSION}.tar.gz skills agents
          sha256sum gfs-ai-tools-${VERSION}.tar.gz > gfs-ai-tools-${VERSION}.tar.gz.sha256

      - name: Upload AI tools artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gfs-ai-tools
          path: |
            gfs-ai-tools-*.tar.gz
            gfs-ai-tools-*.tar.gz.sha256

  release:
    needs: [build, build-ai-tools]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog from conventional commits
        id: changelog
        run: |
          # Find the previous tag
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release — include all commits
            RANGE="HEAD"
          else
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          # Collect commits by category
          FEATURES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^feat" --no-merges)
          FIXES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^fix" --no-merges)
          PERF=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^perf" --no-merges)
          DOCS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^docs" --no-merges)
          REFACTOR=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^refactor" --no-merges)
          CHORE=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^chore" --no-merges)
          CI=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^ci" --no-merges)

          # Build changelog body
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### 🚀 Features\n\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n\n${FIXES}\n\n"
          fi
          if [ -n "$PERF" ]; then
            CHANGELOG="${CHANGELOG}### ⚡ Performance\n\n${PERF}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}### 📚 Documentation\n\n${DOCS}\n\n"
          fi
          if [ -n "$REFACTOR" ]; then
            CHANGELOG="${CHANGELOG}### ♻️ Refactoring\n\n${REFACTOR}\n\n"
          fi
          if [ -n "$CHORE" ]; then
            CHANGELOG="${CHANGELOG}### 🔧 Chores\n\n${CHORE}\n\n"
          fi
          if [ -n "$CI" ]; then
            CHANGELOG="${CHANGELOG}### 👷 CI\n\n${CI}\n\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No conventional commits found in this release.\n"
          fi

          # Write to file to preserve multiline content
          echo -e "$CHANGELOG" > changelog.md

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}" >> changelog.md
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Prepare artifacts
        run: |
          mkdir -p release_assets
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec mv {} release_assets/ \;

      - name: List artifacts
        run: ls -lh release_assets/

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          body_path: changelog.md
          draft: false
