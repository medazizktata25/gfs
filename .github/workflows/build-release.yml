name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false   
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: gfs
            artifact_name: gfs-linux-x64
            archive_name: gfs-linux-x64.tar.gz

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: gfs
            artifact_name: gfs-linux-arm64
            archive_name: gfs-linux-arm64.tar.gz

          # macOS x86_64
          - os: macos-latest-large
            target: x86_64-apple-darwin
            binary_name: gfs
            artifact_name: gfs-darwin-x64
            archive_name: gfs-darwin-x64.zip

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest-large
            target: aarch64-apple-darwin
            binary_name: gfs
            artifact_name: gfs-darwin-arm64
            archive_name: gfs-darwin-arm64.zip

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: gfs.exe
            artifact_name: gfs-windows-x86_64
            archive_name: gfs-windows-x86_64.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p gfs-cli

      - name: Build (cross - Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} -p gfs-cli

      - name: Create archive (tar.gz for Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cd staging
          tar czf ../${{ matrix.archive_name }} *
          cd ..
          rm -rf staging

      - name: Create archive (zip for macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cd staging
          zip -q ../${{ matrix.archive_name }} *
          cd ..
          rm -rf staging

      - name: Create archive (tar.gz for Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
          cd staging
          tar czf ../${{ matrix.archive_name }} *
          cd ..
          rm -rf staging

      - name: Calculate checksums (Linux)
        if: runner.os == 'Linux'
        run: sha256sum ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Calculate checksums (macOS)
        if: runner.os == 'macOS'
        run: shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Calculate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path ${{ matrix.archive_name }} -Algorithm SHA256).Hash
          "$hash  ${{ matrix.archive_name }}" | Out-File -Encoding ascii ${{ matrix.archive_name }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  build-ai-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create AI tools archive
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          tar czf gfs-ai-tools-${VERSION}.tar.gz skills agents
          sha256sum gfs-ai-tools-${VERSION}.tar.gz > gfs-ai-tools-${VERSION}.tar.gz.sha256

      - name: Upload AI tools artifact
        uses: actions/upload-artifact@v7
        with:
          name: gfs-ai-tools
          path: |
            gfs-ai-tools-*.tar.gz
            gfs-ai-tools-*.tar.gz.sha256

  release:
    needs: [build, build-ai-tools]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Prepare artifacts
        run: |
          mkdir -p release_assets
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec mv {} release_assets/ \;

      - name: List artifacts
        run: ls -lh release_assets/

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          body: |
            ## Binaries

            Download the appropriate binary for your platform below.

            ### Checksums

            Verify the integrity of downloaded files using the `.sha256` files.

            ```bash
            sha256sum -c *.sha256
            ```

            ### Supported Platforms

            - **Linux x86_64**: `gfs-linux-x64.tar.gz`
            - **Linux ARM64**: `gfs-linux-arm64.tar.gz`
            - **macOS x86_64**: `gfs-darwin-x64.zip`
            - **macOS ARM64**: `gfs-darwin-arm64.zip`
            - **Windows x86_64**: `gfs-windows-x86_64.tar.gz`

            ### AI Tools (Cursor, Claude, OpenCode)

            The `gfs-ai-tools-*.tar.gz` asset contains skills and agents for AI coding tools. The installer script injects these automatically when Cursor, Claude, or OpenCode are detected.

            ### Installation

            Extract the binary and add it to your PATH, or use the installer script:

            ```bash
            curl -fsSL https://github.com/Guepard-Corp/gfs/releases/download/${{ github.ref_name }}/gfs-<platform>.tar.gz | tar xz
            ```
          draft: false
